{{- /*
AuthorizationPolicy: gate the listed hosts behind Google SSO via the
`oauth2-proxy` extensionProvider declared in istiod meshConfig.

Default everywhere on the gateway = OPEN (no AuthorizationPolicy → no auth).
A request matches a `to.operation` entry below → CUSTOM action runs
→ ext_authz call → oauth2-proxy /oauth2/auth → 200 if Google session cookie
valid, 401 → Envoy redirects browser to auth.<cookieDomain>/oauth2/start
(via the Lua EnvoyFilter sibling template).
*/}}
{{- if and .Values.authPolicy.enabled (or .Values.protectedHosts .Values.protectedPaths) }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.authPolicy.name }}
  namespace: {{ .Values.authPolicy.namespace }}
  labels:
    {{- include "oauth2-proxy-mesh.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.gatewayApp }}
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    {{- /*
    `ports: ["443"]` scopes ext_authz to HTTPS only. HTTP requests on
    port 80 fall through to the Gateway's `httpsRedirect: true` and get
    a 301 to https://<host> instead of a 302 into the oauth flow — so
    Brave's HTTPS-Only Mode (and HSTS-aware clients) can upgrade cleanly
    without the "site doesn't support HTTPS" warning.
    */ -}}
    {{- if .Values.protectedHosts }}
    # ---- whole-host protection ----------------------------------------
    - to:
        - operation:
            ports: ["443"]
            hosts:
              {{- range .Values.protectedHosts }}
              - {{ . | quote }}
              {{- end }}
    {{- end }}
    {{- range .Values.protectedPaths }}
    # ---- path-scoped protection: {{ .host }}{{ .pathPrefix }}* -----------
    - to:
        - operation:
            ports: ["443"]
            hosts:
              - {{ .host | quote }}
            paths:
              - {{ printf "%s*" .pathPrefix | quote }}
    {{- end }}
{{- end }}
