{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.name }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ required "externalSecret.clusterSecretStoreName is required" .Values.externalSecret.clusterSecretStoreName }}
  target:
    name: {{ .Values.externalSecret.targetName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # bitnami chart expects these exact keys
        client-id:     "{{ "{{" }} .clientId {{ "}}" }}"
        client-secret: "{{ "{{" }} .clientSecret {{ "}}" }}"
        cookie-secret: "{{ "{{" }} .cookieSecret {{ "}}" }}"
  data:
    # Reuse existing Google OAuth credentials (same client used for CF Zero Trust).
    # Format: {"web": {"client_id": "...", "client_secret": "..."}}
    - secretKey: clientId
      remoteRef:
        key: {{ required "externalSecret.googleOauthSsmPath is required" .Values.externalSecret.googleOauthSsmPath }}
        property: web.client_id
    - secretKey: clientSecret
      remoteRef:
        key: {{ .Values.externalSecret.googleOauthSsmPath }}
        property: web.client_secret
    # Cookie secret stored separately (auto-generated by Terraform).
    - secretKey: cookieSecret
      remoteRef:
        key: {{ required "externalSecret.cookieSecretSsmPath is required" .Values.externalSecret.cookieSecretSsmPath }}
{{- end }}
